services:
  nginx-app1:
    image: nginx:alpine
    container_name: nginx-app1
    ports:
      - "8081:80"
    volumes:
      - ./html/app1:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx-app2:
    image: nginx:alpine
    container_name: nginx-app2
    ports:
      - "8082:80"
    volumes:
      - ./html/app2:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  tcp-echo:
    image: alpine:latest
    container_name: tcp-echo
    command: sh -c "apk add --no-cache socat && socat TCP-LISTEN:7001,fork,reuseaddr EXEC:'/bin/cat'"
    ports:
      - "7001:7001"
    restart: unless-stopped
