# Traefik Static Configuration
# Default location: /etc/traefik/traefik.yaml
# Generated by: traefikctl config --generate

# ============================================================================
# LOGGING
# ============================================================================
log:
  level: INFO                          # DEBUG, INFO, WARN, ERROR
  filePath: /var/log/traefik/traefik.log
  format: common                       # common or json

accessLog:
  filePath: /var/log/traefik/access.log
  format: common

# ============================================================================
# API / DASHBOARD
# ============================================================================
api:
  dashboard: true
  insecure: false                      # Set true for dev (exposes dashboard without auth)

# ============================================================================
# ENTRYPOINTS
# ============================================================================
entryPoints:
  # HTTP - port 80
  web:
    address: ":80"

  # HTTPS - port 443
  websecure:
    address: ":443"

  # Example: custom entrypoint for a specific service
  # postgres:
  #   address: ":5432"

# ============================================================================
# TLS DEFAULTS
# ============================================================================
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305

# ============================================================================
# PROVIDERS
# Traefik watches this directory and auto-reloads on changes
# ============================================================================
providers:
  file:
    directory: /etc/traefik/dynamic/
    watch: true

# ============================================================================
# TIMEOUTS
# ============================================================================
serversTransport:
  dialTimeout: 5s
  responseHeaderTimeout: 50s
  idleConnTimeout: 50s
