name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run tests
      run: go test -v ./...

    - name: Build binaries
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        LDFLAGS="-s -w -X github.com/eliasmeireles/traefikctl/internal/cmd.Version=${VERSION}"
        GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/traefikctl-linux-amd64 ./cmd/traefikctl
        GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/traefikctl-linux-arm64 ./cmd/traefikctl
        GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/traefikctl-darwin-amd64 ./cmd/traefikctl
        GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/traefikctl-darwin-arm64 ./cmd/traefikctl

    - name: Create checksums
      run: |
        cd bin
        sha256sum traefikctl-* > checksums.txt
        cat checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          bin/traefikctl-linux-amd64
          bin/traefikctl-linux-arm64
          bin/traefikctl-darwin-amd64
          bin/traefikctl-darwin-arm64
          bin/checksums.txt
        draft: false
        prerelease: false
        generate_release_notes: true
